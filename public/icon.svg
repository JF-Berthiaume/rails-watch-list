<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ciné-conseil">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1a14"/>
      <stop offset="1" stop-color="#0f0d0b"/>
    </linearGradient>
    <radialGradient id="gold" cx="0.5" cy="0.45" r="0.65">
      <stop offset="0" stop-color="#e4c07a"/>
      <stop offset="1" stop-color="#c9a24b"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g transform="translate(256 256)" filter="url(#glow)">
    <circle r="168" fill="none" stroke="url(#gold)" stroke-width="18"/>

    <g fill="url(#gold)">
      <circle cx="0"    cy="-120" r="28"/>
      <circle cx="104"  cy="-60"  r="28"/>
      <circle cx="104"  cy="60"   r="28"/>
      <circle cx="0"    cy="120"  r="28"/>
      <circle cx="-104" cy="60"   r="28"/>
      <circle cx="-104" cy="-60"  r="28"/>
    </g>

    <circle r="44" fill="url(#gold)"/>
    <circle r="16" fill="#0f0d0b"/>
  </g>
</svg>
